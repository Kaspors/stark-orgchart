<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#667eea" />
  <title>The Optimistic Weather App</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100%;
      background: linear-gradient(160deg, #667eea 0%, #764ba2 100%);
      background-attachment: fixed;
      color: #fff;
      transition: background 1.2s ease;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    /* ── Title ── */
    .title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      opacity: .7;
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── Search ── */
    .search {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,.15);
      border-radius: 14px;
      padding: 4px 4px 4px 16px;
      margin-bottom: 40px;
      border: 1px solid rgba(255,255,255,.2);
    }
    .search input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-size: 16px;
      outline: none;
      padding: 8px 0;
    }
    .search input::placeholder { color: rgba(255,255,255,.5); }
    .search-btn {
      background: rgba(255,255,255,.2);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
      margin-left: 4px;
    }
    .search-btn:hover  { background: rgba(255,255,255,.3); }
    .search-btn:active { background: rgba(255,255,255,.4); }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 80px 0;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2.5px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 15px; opacity: .65; }

    /* ── Error ── */
    .error-msg {
      background: rgba(255,80,80,.18);
      border: 1px solid rgba(255,120,120,.35);
      border-radius: 14px;
      padding: 18px 20px;
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 8px 0 32px;
    }
    .hero-icon {
      font-size: 88px;
      line-height: 1;
      display: block;
      margin-bottom: 8px;
    }
    .hero-temp {
      font-size: 86px;
      font-weight: 200;
      letter-spacing: -4px;
      line-height: 1;
    }
    .hero-desc {
      font-size: 20px;
      font-weight: 500;
      margin-top: 12px;
      opacity: .95;
    }
    .hero-feels {
      font-size: 14px;
      opacity: .6;
      margin-top: 3px;
    }
    .hero-location {
      font-size: 14px;
      opacity: .7;
      margin-top: 6px;
    }
    .hero-source {
      font-size: 12px;
      opacity: .5;
      margin-top: 4px;
    }

    /* ── Stats row ── */
    .stats {
      display: flex;
      justify-content: space-around;
      padding: 20px 0;
      border-top: 1px solid rgba(255,255,255,.15);
      border-bottom: 1px solid rgba(255,255,255,.15);
      margin-bottom: 32px;
    }
    .stat { text-align: center; }
    .stat-val  { font-size: 18px; font-weight: 600; }
    .stat-lbl  { font-size: 11px; opacity: .55; margin-top: 2px; letter-spacing: .3px; }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: .5;
      margin-bottom: 12px;
    }

    /* ── Forecast ── */
    .forecast { margin-bottom: 32px; }
    .fc-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .fc-row:last-child { border-bottom: none; }
    .fc-day   { width: 52px; font-size: 14px; font-weight: 500; }
    .fc-icon  { font-size: 22px; flex: 1; text-align: center; }
    .fc-rain  { width: 40px; text-align: center; font-size: 13px; opacity: .65; }
    .fc-temps { text-align: right; }
    .fc-hi    { font-size: 15px; font-weight: 600; }
    .fc-lo    { font-size: 12px; opacity: .5; }

    /* ── Sources ── */
    .sources { margin-bottom: 36px; }
    .src-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,.1);
      font-size: 14px;
    }
    .src-row:last-child { border-bottom: none; }
    .src-name   { width: 76px; opacity: .75; font-weight: 500; }
    .src-icon   { font-size: 18px; }
    .src-detail { flex: 1; }
    .src-chosen {
      font-size: 11px;
      font-weight: 700;
      opacity: .7;
      background: rgba(255,255,255,.2);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── Share ── */
    .share-btn {
      width: 100%;
      padding: 15px;
      background: rgba(255,255,255,.18);
      border: 1.5px solid rgba(255,255,255,.35);
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      letter-spacing: .2px;
      margin-bottom: 12px;
    }
    .share-btn:hover  { background: rgba(255,255,255,.27); }
    .share-btn:active { transform: scale(.98); }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 12px;
      opacity: .35;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: rgba(15,15,15,.85);
      color: #fff;
      padding: 11px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app">

  <div class="title">The Optimistic Weather App</div>

  <div class="search">
    <input id="cityInput" type="text" placeholder="Search city…" autocomplete="off" />
    <button class="search-btn" onclick="searchCity()" title="Search">🔍</button>
    <button class="search-btn" onclick="useGPS()" title="Use my location">📍</button>
  </div>

  <div id="loadingDiv" class="loading hidden">
    <div class="spinner"></div>
    <p>Finding the best forecast…</p>
  </div>

  <div id="errorDiv" class="error-msg hidden"></div>

  <div id="weatherDiv" class="hidden">

    <div class="hero">
      <span class="hero-icon" id="heroIcon">☀️</span>
      <div class="hero-temp" id="heroTemp">--°</div>
      <div class="hero-desc" id="heroDesc"></div>
      <div class="hero-feels" id="heroFeels"></div>
      <div class="hero-location" id="heroLocation"></div>
      <div class="hero-source" id="optimismSource"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="sRain">--</div>
        <div class="stat-lbl">Rain chance</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="sWind">--</div>
        <div class="stat-lbl">Wind km/h</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="sRange">--</div>
        <div class="stat-lbl">Hi / Lo</div>
      </div>
    </div>

    <div class="forecast">
      <div class="section-label">7-Day Forecast</div>
      <div id="forecastList"></div>
    </div>

    <div class="sources">
      <div class="section-label">Forecast Sources</div>
      <div id="providerList"></div>
    </div>

    <button class="share-btn" onclick="shareWeather()">Share this forecast</button>
    <div class="footer" id="lastUpdated"></div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WMO = {
   0: { d:'Clear sky',           i:'☀️',  s:10 },
   1: { d:'Mainly clear',        i:'🌤️', s:9  },
   2: { d:'Partly cloudy',       i:'⛅',  s:7  },
   3: { d:'Overcast',            i:'☁️',  s:5  },
  45: { d:'Foggy',               i:'🌫️', s:3  },
  48: { d:'Icy fog',             i:'🌫️', s:2  },
  51: { d:'Light drizzle',       i:'🌦️', s:4  },
  53: { d:'Drizzle',             i:'🌦️', s:3  },
  55: { d:'Heavy drizzle',       i:'🌧️', s:2  },
  61: { d:'Light rain',          i:'🌧️', s:3  },
  63: { d:'Rain',                i:'🌧️', s:2  },
  65: { d:'Heavy rain',          i:'🌧️', s:1  },
  71: { d:'Light snow',          i:'🌨️', s:3  },
  73: { d:'Snow',                i:'❄️',  s:2  },
  75: { d:'Heavy snow',          i:'❄️',  s:1  },
  77: { d:'Snow grains',         i:'🌨️', s:2  },
  80: { d:'Light showers',       i:'🌦️', s:4  },
  81: { d:'Showers',             i:'🌧️', s:2  },
  82: { d:'Heavy showers',       i:'⛈️', s:1  },
  85: { d:'Snow showers',        i:'🌨️', s:2  },
  86: { d:'Heavy snow showers',  i:'🌨️', s:1  },
  95: { d:'Thunderstorm',        i:'⛈️', s:0  },
  96: { d:'Thunderstorm+hail',   i:'⛈️', s:0  },
  99: { d:'Severe thunderstorm', i:'⛈️', s:0  },
};

function wmo(code) {
  return WMO[code] || { d:'Unknown', i:'🌡️', s:5 };
}

function bgForScore(s) {
  if (s >= 9) return 'linear-gradient(160deg,#f7b733 0%,#f85c2f 100%)';
  if (s >= 7) return 'linear-gradient(160deg,#667eea 0%,#764ba2 100%)';
  if (s >= 5) return 'linear-gradient(160deg,#536976 0%,#292e49 100%)';
  if (s >= 2) return 'linear-gradient(160deg,#1e3c72 0%,#2a5298 100%)';
  return 'linear-gradient(160deg,#232526 0%,#414345 100%)';
}

let state = { lat: null, lon: null, name: '' };

window.addEventListener('DOMContentLoaded', () => {
  const p = new URLSearchParams(location.search);
  if (p.get('lat') && p.get('lon')) {
    state.lat  = parseFloat(p.get('lat'));
    state.lon  = parseFloat(p.get('lon'));
    state.name = p.get('name') ? decodeURIComponent(p.get('name')) : coord(state.lat, state.lon);
    load();
  } else {
    useGPS();
  }
});

function useGPS() {
  showLoading();
  if (!navigator.geolocation) { showError('Geolocation not supported — enter a city name.'); return; }
  navigator.geolocation.getCurrentPosition(
    async pos => {
      state.lat = pos.coords.latitude;
      state.lon = pos.coords.longitude;
      state.name = await reverseLookup(state.lat, state.lon);
      load();
    },
    () => {
      hideLoading();
      showError('Could not get GPS position. Enter a city name above.');
    },
    { timeout: 8000 }
  );
}

async function reverseLookup(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    const d = await r.json();
    const a = d.address || {};
    const city = a.city || a.town || a.village || a.county || '';
    const cc   = (a.country_code || '').toUpperCase();
    return city ? `${city}, ${cc}` : coord(lat, lon);
  } catch { return coord(lat, lon); }
}

document.getElementById('cityInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchCity(); });

async function searchCity() {
  const q = document.getElementById('cityInput').value.trim();
  if (!q) return;
  showLoading();
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en&format=json`);
    const d = await r.json();
    if (!d.results?.length) { showError(`No results for "${q}". Try another city.`); return; }
    const loc = d.results[0];
    state.lat  = loc.latitude;
    state.lon  = loc.longitude;
    state.name = `${loc.name}, ${(loc.country_code||'').toUpperCase()}`;
    load();
  } catch { showError('Search failed — check your connection.'); }
}

async function fetchModel(lat, lon, modelId) {
  const base = 'https://api.open-meteo.com/v1/forecast';
  const params = [
    `latitude=${lat}`,
    `longitude=${lon}`,
    `current=temperature_2m,apparent_temperature,precipitation,weathercode,windspeed_10m`,
    `daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max`,
    `timezone=auto`,
    `forecast_days=7`,
    `models=${modelId}`,
  ].join('&');
  const r = await fetch(`${base}?${params}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  d._model = modelId;
  return d;
}

const MODELS = [
  { id: 'best_match',    label: 'Best Match'  },
  { id: 'ecmwf_ifs025', label: 'ECMWF'       },
  { id: 'gfs_seamless', label: 'GFS'         },
  { id: 'icon_seamless', label: 'ICON'       },
];

async function load() {
  showLoading();
  const results = await Promise.allSettled(
    MODELS.map(m => fetchModel(state.lat, state.lon, m.id).then(d => { d._label = m.label; return d; }))
  );
  const ok = results.filter(r => r.status === 'fulfilled').map(r => r.value);
  if (!ok.length) { showError('Could not fetch weather data. Please try again.'); return; }
  render(ok);
}

function render(models) {
  hideLoading();

  let best = models[0], bestScore = -Infinity;
  for (const m of models) {
    if (!m.current) continue;
    const s = wmo(m.current.weathercode).s;
    if (s > bestScore) { bestScore = s; best = m; }
  }

  const cur  = best.current;
  const info = wmo(cur.weathercode);

  document.body.style.background = bgForScore(info.s);

  set('heroIcon',    info.i);
  set('heroTemp',    `${Math.round(cur.temperature_2m)}°`);
  set('heroDesc',    info.d);
  set('heroFeels',   `Feels like ${Math.round(cur.apparent_temperature)}°`);
  set('heroLocation','📍 ' + state.name);
  set('optimismSource', `Best case · ${best._label}`);

  const validModels = models.filter(m => m.current);
  const minWind  = Math.min(...validModels.map(m => m.current.windspeed_10m ?? Infinity));
  const maxHi    = Math.max(...models.filter(m => m.daily?.temperature_2m_max?.[0] != null).map(m => m.daily.temperature_2m_max[0]));
  const minLo    = Math.min(...models.filter(m => m.daily?.temperature_2m_min?.[0] != null).map(m => m.daily.temperature_2m_min[0]));
  const minRain  = Math.min(...models.filter(m => m.daily?.precipitation_probability_max?.[0] != null).map(m => m.daily.precipitation_probability_max[0]));

  set('sRain',  isFinite(minRain)  ? Math.round(minRain) + '%' : '--');
  set('sWind',  isFinite(minWind)  ? Math.round(minWind)       : '--');
  set('sRange', `${isFinite(maxHi) ? Math.round(maxHi) : '--'}° / ${isFinite(minLo) ? Math.round(minLo) : '--'}°`);

  const DAY = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const fEl = document.getElementById('forecastList');
  fEl.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    let bestCode = null, bestS = -Infinity, hiMax = -Infinity, loMin = Infinity, rainMin = Infinity;
    for (const m of models) {
      const d = m.daily;
      if (!d) continue;
      const code = d.weathercode?.[i];
      if (code != null) {
        const s = wmo(code).s;
        if (s > bestS) { bestS = s; bestCode = code; }
      }
      if (d.temperature_2m_max?.[i] != null && d.temperature_2m_max[i] > hiMax) hiMax = d.temperature_2m_max[i];
      if (d.temperature_2m_min?.[i] != null && d.temperature_2m_min[i] < loMin) loMin = d.temperature_2m_min[i];
      if (d.precipitation_probability_max?.[i] != null && d.precipitation_probability_max[i] < rainMin) rainMin = d.precipitation_probability_max[i];
    }
    if (bestCode == null) continue;
    const w    = wmo(bestCode);
    const date = new Date(); date.setDate(date.getDate() + i);
    const day  = i === 0 ? 'Today' : DAY[date.getDay()];
    const row  = document.createElement('div');
    row.className = 'fc-row';
    row.innerHTML =
      `<div class="fc-day">${day}</div>` +
      `<div class="fc-icon">${w.i}</div>` +
      `<div class="fc-rain">${isFinite(rainMin) ? Math.round(rainMin)+'%' : ''}</div>` +
      `<div class="fc-temps">` +
        `<div class="fc-hi">${isFinite(hiMax) ? Math.round(hiMax)+'°' : '--'}</div>` +
        `<div class="fc-lo">${isFinite(loMin) ? Math.round(loMin)+'°' : '--'}</div>` +
      `</div>`;
    fEl.appendChild(row);
  }

  const pEl = document.getElementById('providerList');
  pEl.innerHTML = '';
  for (const m of models) {
    if (!m.current) continue;
    const w      = wmo(m.current.weathercode);
    const chosen = m._model === best._model;
    const row    = document.createElement('div');
    row.className = 'src-row';
    row.innerHTML =
      `<div class="src-name">${m._label}</div>` +
      `<div class="src-icon">${w.i}</div>` +
      `<div class="src-detail">${Math.round(m.current.temperature_2m)}° · ${w.d}</div>` +
      (chosen ? `<div class="src-chosen">chosen</div>` : '');
    pEl.appendChild(row);
  }

  const url = new URL(location.href);
  url.searchParams.set('lat',  state.lat.toFixed(4));
  url.searchParams.set('lon',  state.lon.toFixed(4));
  url.searchParams.set('name', encodeURIComponent(state.name));
  history.replaceState({}, '', url);

  set('lastUpdated', 'Updated ' + new Date().toLocaleTimeString());
  document.getElementById('weatherDiv').classList.remove('hidden');
}

function shareWeather() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: 'The Optimistic Weather App', text: `Best forecast for ${state.name}!`, url });
  } else {
    navigator.clipboard.writeText(url).then(() => toast('Link copied!'));
  }
}

function set(id, v) { document.getElementById(id).textContent = v; }
function coord(lat, lon) { return `${lat.toFixed(2)}°N, ${lon.toFixed(2)}°E`; }

function showLoading() {
  document.getElementById('loadingDiv').classList.remove('hidden');
  document.getElementById('weatherDiv').classList.add('hidden');
  document.getElementById('errorDiv').classList.add('hidden');
}
function hideLoading() { document.getElementById('loadingDiv').classList.add('hidden'); }
function showError(msg) {
  hideLoading();
  const el = document.getElementById('errorDiv');
  el.textContent = '⚠️ ' + msg;
  el.classList.remove('hidden');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
