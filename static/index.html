<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>STARK Org Chart</title>
  <link rel="stylesheet" href="/static/styles.css?v=1" />
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    :root { --topbar-h: 56px; }
    #topbar { height: var(--topbar-h); display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-bottom: 1px solid rgba(0,0,0,.1); background: #fff; }
    #logo { font-weight: 800; color: #F36F21; letter-spacing: .2px; }
    #chart { height: calc(100vh - var(--topbar-h)); min-height: 480px; width: 100%;
      background: #fafafa; position: relative; overflow: hidden; }
    .btn { border: 1px solid rgba(0,0,0,.15); background: #fff; padding: .4rem .7rem; border-radius: .5rem; cursor: pointer; font-size: .9rem; }
    .btn:hover { background: #f3f3f3; }
    .node-card { box-shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.24);
      border-radius: 10px; background: #fff; padding: 10px 12px; border: 1px solid rgba(0,0,0,.06); min-width: 220px; }
    .node-name { font-weight: 700; font-size: 14px; margin: 0 0 4px 0; }
    .node-title { font-size: 12px; color: #555; margin: 0; }
    #alert { margin: 8px 12px; padding: 10px 12px; border-radius: 8px; background: #fff3cd; color: #664d03; border: 1px solid #ffecb5; display: none; }
    #info { position: absolute; right: 8px; bottom: 8px; background: rgba(0,0,0,.6); color: #fff; padding: 6px 8px; border-radius: 6px; font-size: 12px; z-index: 5; pointer-events: none; }
  </style>
</head>
<body>
  <div id="topbar">
    <div id="logo">STARK Org Chart</div>
    <div style="flex:1"></div>
    <button id="btn-zoom-out" class="btn">−</button>
    <button id="btn-fit" class="btn">Fit</button>
    <button id="btn-zoom-in" class="btn">+</button>
  </div>

  <div id="alert"></div>
  <div id="chart"><div id="info">loading…</div></div>

  <!-- d3 → UMD flextree (attaches to d3) → local d3-org-chart → chart -->
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
  <script src="https://unpkg.com/d3-flextree@2.1.2/build/d3-flextree.js"></script>
  <script src="/static/lib/d3-org-chart.min.js"></script>

  <script>
    if (window.d3 && !d3.flextree && typeof window.flextree === 'function') {
      d3.flextree = window.flextree;
    }
    console.log('deps:', { d3: typeof d3, flextree: typeof (d3 && d3.flextree), OrgChart: typeof (d3 && d3.OrgChart) });
  </script>

  <script src="/static/chart.js?v=701"></script>
</body>
</html>
