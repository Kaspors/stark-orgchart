<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin • STARK Org Chart</title>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body>
  <div id="topbar">
    <div id="logo">🟧 <strong>Admin</strong></div>

    <input id="adminKey" placeholder="Admin key" />
    <input id="file" type="file" accept=".xlsx,.xls" />
    <button id="upload">Upload Excel</button>

    <div id="controls">
      <a class="btn-link" href="/" title="View Org Chart">Org Chart</a>
    </div>
  </div>

  <div style="padding:12px;">
    <h2>People</h2>

    <div style="display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem">
      <input id="name" placeholder="Name"/>
      <input id="title" placeholder="Title"/>
      <input id="department" placeholder="Department"/>
      <input id="sub_department" placeholder="Sub-department"/>
      <input id="team" placeholder="Team"/>
      <select id="role">
        <option value="">Role/tag (optional)</option>
        <option>Head</option>
        <option>Director</option>
        <option>Senior Manager</option>
        <option>Manager</option>
        <option>Specialist</option>
      </select>
      <select id="manager"><option value="">Manager (optional)</option></select>
      <button id="add">Add Person</button>
    </div>

    <table id="table" style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
          <th align="left">Name</th>
          <th align="left">Title</th>
          <th align="left">Department</th>
          <th align="left">Sub-department</th>
          <th align="left">Team</th>
          <th align="left">Role</th>
          <th align="left">Manager</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="/static/admin.js"></script>
</body>
</html>
